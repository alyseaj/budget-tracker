<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Understory · Campaign Budget Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  /* ── RESET & BASE ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #07080f;
    --surface:   #0d0f1a;
    --surface2:  #111320;
    --border:    #1c1f30;
    --border2:   #252840;
    --text:      #dde1f5;
    --muted:     #4a4f6a;
    --muted2:    #6b7094;
    --accent:    #5b5fef;
    --accent2:   #7b7ff5;
    --green:     #22c55e;
    --amber:     #f59e0b;
    --red:       #ef4444;
    --li:        #0a66c2;
    --meta:      #1877f2;
    --reddit:    #ff4500;
    --radius:    14px;
    --card-radius: 18px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, #5b5fef11 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 100%, #0a66c210 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LAYOUT ── */
  .wrap { max-width: 1160px; margin: 0 auto; padding: 0 28px; position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    padding: 48px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .header-inner { display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 20px; }

  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted2);
    text-transform: uppercase; letter-spacing: .15em;
    margin-bottom: 10px;
  }

  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .6; transform: scale(.85); }
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(26px, 4vw, 40px);
    font-weight: 800;
    letter-spacing: -.03em;
    line-height: 1.1;
    background: linear-gradient(120deg, var(--text) 40%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted2);
    margin-top: 8px;
  }

  /* ── SUMMARY STRIP ── */
  .summary {
    display: flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 28px;
  }

  .summary-item {
    flex: 1; padding: 18px 24px;
    border-right: 1px solid var(--border);
    min-width: 120px;
  }
  .summary-item:last-child { border-right: none; }

  .summary-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .summary-val {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: -.02em;
  }

  .summary-bar-wrap { flex: 2; padding: 18px 24px; display: flex; flex-direction: column; justify-content: center; }

  /* ── VIEW SWITCHER ── */
  .views { display: flex; gap: 6px; margin-bottom: 28px; flex-wrap: wrap; }

  .view-btn {
    padding: 8px 22px;
    border-radius: 99px;
    font-size: 13px; font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    transition: all .2s;
    outline: none;
  }

  .view-btn:hover { color: var(--text); border-color: var(--accent); }

  .view-btn.active {
    background: #5b5fef20;
    border-color: var(--accent);
    color: var(--accent2);
    font-weight: 600;
  }

  /* ── CARDS GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color .2s, transform .15s;
    animation: fadeUp .4s both;
  }

  .card:hover { border-color: var(--border2); transform: translateY(-2px); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    filter: blur(40px);
    opacity: .07;
    pointer-events: none;
  }

  .card[data-platform="LinkedIn"]::before  { background: var(--li); }
  .card[data-platform="Meta"]::before      { background: var(--meta); }
  .card[data-platform="Reddit"]::before    { background: var(--reddit); }

  /* ── CARD HEADER ── */
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }

  .client-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700;
    color: var(--text); margin-bottom: 5px;
  }

  .platform-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 600;
    font-family: 'DM Mono', monospace;
    padding: 3px 10px; border-radius: 6px;
    border: 1px solid;
  }

  .platform-tag.LinkedIn { color: var(--li); border-color: #0a66c230; background: #0a66c210; }
  .platform-tag.Meta     { color: var(--meta); border-color: #1877f230; background: #1877f210; }
  .platform-tag.Reddit   { color: var(--reddit); border-color: #ff450030; background: #ff450010; }

  .platform-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── PROGRESS BAR ── */
  .bar-track {
    height: 6px; background: #1e2130;
    border-radius: 99px; overflow: hidden;
    margin: 8px 0 6px;
  }

  .bar-fill {
    height: 100%; border-radius: 99px;
    transition: width .7s cubic-bezier(.22,1,.36,1);
  }

  /* ── VIEW: SPENT ── */
  .spent-main {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 2px;
  }

  .big-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -.03em;
  }

  .pct-badge {
    font-family: 'DM Mono', monospace;
    font-size: 16px; font-weight: 500;
  }

  .sub-text { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* ── VIEW: PACING ── */
  .pacing-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }

  .pacing-bar-wrap { position: relative; }

  .pacing-marker {
    position: absolute; top: -3px;
    width: 2px; height: 12px;
    background: var(--accent);
    border-radius: 2px;
    transform: translateX(-50%);
    z-index: 2;
  }

  .pacing-status {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    font-family: 'DM Mono', monospace;
    padding: 4px 10px; border-radius: 6px;
    margin-top: 10px;
    border: 1px solid;
  }

  /* ── VIEW: LEADS ── */
  .leads-grid { display: flex; gap: 16px; }
  .leads-col { flex: 1; }
  .col-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin-bottom: 5px;
    font-family: 'DM Mono', monospace;
  }
  .leads-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -.03em;
  }
  .leads-goal { font-size: 13px; color: var(--muted); margin-left: 5px; }
  .cpl-target { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── SHEET CONFIG PANEL ── */
  .config-banner {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
  }

  .config-banner label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted2); display: block; margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }

  .config-banner input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 14px;
    width: 420px; max-width: 100%;
    outline: none;
    transition: border-color .2s;
  }
  .config-banner input:focus { border-color: var(--accent); }

  .btn-load {
    padding: 9px 22px; border-radius: 8px;
    background: var(--accent); border: none;
    color: #fff; font-weight: 600; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: opacity .2s;
    white-space: nowrap;
  }
  .btn-load:hover { opacity: .85; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
  }

  /* ── LOADER ── */
  .loader {
    text-align: center; padding: 80px 0;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--muted);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LAST UPDATED ── */
  .last-updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--muted);
    text-align: center; margin-top: 32px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .summary { flex-direction: column; }
    .summary-item { border-right: none; border-bottom: 1px solid var(--border); }
    .summary-item:last-child { border-bottom: none; }
    .config-banner input { width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div>
        <div class="brand"><span class="brand-dot"></span>Understory Agency</div>
        <h1>Campaign Budget Tracker</h1>
        <p class="date-badge" id="dateBadge"></p>
      </div>
    </div>
  </header>

  <!-- SHEET CONFIG -->
  <div class="config-banner">
    <div style="flex:1; min-width:240px">
      <label>Google Sheets CSV URL</label>
      <input type="text" id="sheetUrl"
        placeholder="https://docs.google.com/spreadsheets/d/YOUR_ID/gviz/tq?tqx=out:csv&sheet=Data"
        value=""/>
    </div>
    <div>
      <button class="btn-load" onclick="loadFromSheet()">↻ Load Data</button>
    </div>
    <div id="statusMsg" style="font-size:12px; color:var(--muted2); font-family:'DM Mono',monospace; align-self:center;"></div>
  </div>

  <!-- SUMMARY -->
  <div class="summary" id="summaryStrip" style="display:none">
    <div class="summary-item">
      <div class="summary-label">Total Budget</div>
      <div class="summary-val" id="sumBudget" style="color:var(--text)">—</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Total Spent</div>
      <div class="summary-val" id="sumSpent" style="color:var(--accent2)">—</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Remaining</div>
      <div class="summary-val" id="sumRemaining" style="color:var(--green)">—</div>
    </div>
    <div class="summary-bar-wrap">
      <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:6px; font-family:'DM Mono',monospace;">
        <span>Overall spend</span><span id="sumPct">—</span>
      </div>
      <div class="bar-track"><div class="bar-fill" id="sumBar" style="background:var(--accent); width:0%"></div></div>
    </div>
  </div>

  <!-- VIEW SWITCHER -->
  <div class="views">
    <button class="view-btn active" onclick="setView('spent',this)">Budget Spent</button>
    <button class="view-btn" onclick="setView('pacing',this)">Pacing</button>
    <button class="view-btn" onclick="setView('leads',this)">Leads &amp; CPL</button>
  </div>

  <!-- CARDS -->
  <div id="loader" class="loader" style="display:none">
    <div class="spinner"></div>Fetching from Google Sheets…
  </div>
  <div class="grid" id="grid"></div>

  <!-- FALLBACK / DEMO NOTE -->
  <div id="demoNote" style="text-align:center; padding:60px 20px; color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; line-height:1.8;">
    Paste your Google Sheets CSV URL above and click <strong style="color:var(--muted2)">Load Data</strong> to pull live campaign data.<br>
    <span style="color:var(--border2)">— or —</span><br>
    <a href="#" onclick="loadDemo(); return false;" style="color:var(--accent2); text-decoration:none;">Load demo data to preview the dashboard</a>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
// ── DATE HELPERS ──────────────────────────────────────────────
const now        = new Date();
const year       = now.getFullYear();
const month      = now.getMonth();
const dayOfMonth = now.getDate();
const daysInMonth= new Date(year, month + 1, 0).getDate();
const pctElapsed = dayOfMonth / daysInMonth;

const MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];

document.getElementById('dateBadge').textContent =
  `Day ${dayOfMonth} of ${daysInMonth} · ${MONTH_NAMES[month]} ${year} · ${Math.round(pctElapsed*100)}% through the month`;

// ── STATE ─────────────────────────────────────────────────────
let currentView = 'spent';
let clients     = [];

// ── FORMAT HELPERS ────────────────────────────────────────────
const fmt   = n => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {maximumFractionDigits:0});
const fmt2  = n => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
const pct   = (a,b) => b ? Math.min(Math.round((a/b)*100), 100) : 0;
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

// ── PARSE CSV ─────────────────────────────────────────────────
function parseCSV(text) {
  const lines  = text.trim().split('\n');
  const header = lines[0].split(',').map(h => h.trim().replace(/"/g,'').toLowerCase());
  return lines.slice(1).map(line => {
    const vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
    const obj  = {};
    header.forEach((h, i) => {
      const v = (vals[i] || '').replace(/"/g,'').trim();
      obj[h]  = v === '' || v === 'null' || v === '#DIV/0!' ? null
              : isNaN(v) ? v : Number(v);
    });
    return obj;
  }).filter(r => r.client);
}

// ── LOAD FROM SHEET ───────────────────────────────────────────
async function loadFromSheet() {
  const url = document.getElementById('sheetUrl').value.trim();
  if (!url) { setStatus('⚠ Please paste your Sheet URL first', '#f59e0b'); return; }

  document.getElementById('loader').style.display  = 'block';
  document.getElementById('grid').innerHTML         = '';
  document.getElementById('demoNote').style.display = 'none';
  document.getElementById('summaryStrip').style.display = 'none';
  setStatus('Fetching…', 'var(--muted2)');

  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    clients    = parseCSV(text);
    if (!clients.length) throw new Error('No rows found — check column headers');
    renderAll();
    setStatus(`✓ ${clients.length} accounts loaded`, 'var(--green)');
    document.getElementById('lastUpdated').textContent =
      `Last fetched: ${new Date().toLocaleTimeString()}`;
  } catch(e) {
    setStatus(`✗ ${e.message}`, 'var(--red)');
    document.getElementById('loader').style.display = 'none';
    document.getElementById('demoNote').style.display = 'block';
  }
}

// ── DEMO DATA ─────────────────────────────────────────────────
function loadDemo() {
  clients = [
    { client:'PlayerZero', platform:'LinkedIn', budget:10000, spent:1478,  leads:0,    lead_goal:null, cpl_goal:null  },
    { client:'PlayerZero', platform:'Reddit',   budget:3500,  spent:999,   leads:null, lead_goal:null, cpl_goal:null  },
    { client:'Runway',     platform:'LinkedIn', budget:25000, spent:6301,  leads:15,   lead_goal:null, cpl_goal:300   },
    { client:'Runway',     platform:'Meta',     budget:25000, spent:5716,  leads:26,   lead_goal:null, cpl_goal:250   },
    { client:'Optiversal', platform:'LinkedIn', budget:8000,  spent:1836,  leads:2,    lead_goal:null, cpl_goal:null  },
    { client:'Outtake',    platform:'LinkedIn', budget:10000, spent:0,     leads:0,    lead_goal:18,   cpl_goal:null  },
    { client:'Doppel',     platform:'Reddit',   budget:5000,  spent:1200,  leads:4,    lead_goal:10,   cpl_goal:250   },
  ];
  document.getElementById('demoNote').style.display = 'none';
  setStatus('Demo data loaded', 'var(--muted2)');
  renderAll();
}

// ── RENDER ALL ────────────────────────────────────────────────
function renderAll() {
  document.getElementById('loader').style.display = 'none';
  updateSummary();
  renderCards();
}

function updateSummary() {
  const totalBudget  = clients.reduce((s,c)=>s+(c.budget||0),0);
  const totalSpent   = clients.reduce((s,c)=>s+(c.spent||0),0);
  const totalRemain  = totalBudget - totalSpent;
  const totalPct     = pct(totalSpent, totalBudget);

  document.getElementById('sumBudget').textContent   = fmt(totalBudget);
  document.getElementById('sumSpent').textContent    = fmt(totalSpent);
  document.getElementById('sumRemaining').textContent= fmt(totalRemain);
  document.getElementById('sumPct').textContent      = totalPct + '%';
  document.getElementById('sumBar').style.width      = totalPct + '%';
  document.getElementById('summaryStrip').style.display = 'flex';
}

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  clients.forEach((c, i) => {
    const card = buildCard(c, currentView, i);
    grid.appendChild(card);
  });
}

// ── BUILD CARD ────────────────────────────────────────────────
function buildCard(c, view, idx) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.platform = c.platform;
  div.style.animationDelay = (idx * 0.05) + 's';

  const spentPct    = pct(c.spent, c.budget);
  const expectedPct = Math.round(pctElapsed * 100);
  const expectedSpend = c.budget * pctElapsed;
  const cpl         = c.leads && c.spent ? c.spent / c.leads : null;
  const cplOk       = c.cpl_goal && cpl ? cpl <= c.cpl_goal : null;

  // bar color for spent view
  const spentColor = spentPct > 90 ? 'var(--red)' : spentPct > 70 ? 'var(--amber)' : 'var(--accent)';

  // pacing
  const pacingDiff = spentPct - expectedPct;
  const isPacingBehind = pacingDiff < -5;
  const isPacingAhead  = pacingDiff > 5;
  const pacingColor    = isPacingBehind ? 'var(--accent2)' : isPacingAhead ? 'var(--amber)' : 'var(--green)';
  const pacingLabel    = isPacingBehind
    ? `↓ ${Math.abs(pacingDiff)}% under pace`
    : isPacingAhead ? `↑ ${pacingDiff}% over pace` : '✓ On pace';
  const pacingBorderColor = isPacingBehind ? '#7b7ff530' : isPacingAhead ? '#f59e0b30' : '#22c55e30';
  const pacingBgColor     = isPacingBehind ? '#7b7ff510' : isPacingAhead ? '#f59e0b10' : '#22c55e10';

  // header HTML
  const head = `
    <div class="card-head">
      <div>
        <div class="client-name">${c.client}</div>
        <span class="platform-tag ${c.platform}">
          <span class="platform-dot"></span>${c.platform}
        </span>
      </div>
    </div>`;

  let body = '';

  if (view === 'spent') {
    body = `
      <div class="spent-main">
        <span class="big-num" style="color:var(--text)">${fmt(c.spent)}</span>
        <span class="pct-badge" style="color:${spentColor}">${spentPct}%</span>
      </div>
      <div style="font-size:12px; color:var(--muted); margin-bottom:6px">of ${fmt(c.budget)} budget</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${spentPct}%; background:${spentColor}"></div>
      </div>
      <div class="sub-text">${fmt(c.budget - c.spent)} remaining</div>`;
  }

  else if (view === 'pacing') {
    body = `
      <div class="pacing-row">
        <div>
          <span class="big-num" style="color:var(--text); font-size:22px">${fmt(c.spent)}</span>
          <span style="font-size:12px; color:var(--muted); margin-left:5px">spent</span>
        </div>
        <div style="text-align:right">
          <span style="font-size:13px; color:var(--accent2); font-weight:600">${fmt(expectedSpend)}</span>
          <div style="font-size:11px; color:var(--muted)">expected day ${dayOfMonth}</div>
        </div>
      </div>
      <div class="pacing-bar-wrap">
        <div class="pacing-marker" style="left:${expectedPct}%"></div>
        <div class="bar-track" style="height:8px">
          <div class="bar-fill" style="width:${spentPct}%; background:${pacingColor}"></div>
        </div>
      </div>
      <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:5px; font-family:'DM Mono',monospace;">
        <span>Spent <span style="color:${pacingColor}; font-weight:600">${spentPct}%</span></span>
        <span style="color:var(--accent2)">Expected ${expectedPct}%</span>
      </div>
      <div class="pacing-status" style="color:${pacingColor}; border-color:${pacingBorderColor}; background:${pacingBgColor}">
        ${pacingLabel}
      </div>`;
  }

  else if (view === 'leads') {
    const leadGoalDisplay = c.lead_goal != null ? `/ ${c.lead_goal}` : '';
    const leadsBarPct     = c.lead_goal ? pct(c.leads||0, c.lead_goal) : 0;
    const cplColor        = cplOk === true ? 'var(--green)' : cplOk === false ? 'var(--red)' : 'var(--text)';
    const cplNote         = cplOk === true ? '<span style="color:var(--green)"> ✓ on target</span>'
                          : cplOk === false ? '<span style="color:var(--red)"> ↑ over goal</span>' : '';

    body = `
      <div class="leads-grid">
        <div class="leads-col">
          <div class="col-label">Leads</div>
          <div>
            <span class="leads-num">${c.leads ?? '—'}</span>
            ${c.lead_goal != null ? `<span class="leads-goal">${leadGoalDisplay}</span>` : ''}
          </div>
          ${c.lead_goal ? `
            <div class="bar-track" style="margin-top:8px">
              <div class="bar-fill" style="width:${leadsBarPct}%; background:var(--accent)"></div>
            </div>` : ''}
        </div>
        <div class="leads-col">
          <div class="col-label">CPL</div>
          <div class="leads-num" style="color:${cplColor}">${fmt2(cpl)}</div>
          ${c.cpl_goal ? `
            <div class="cpl-target">Goal: <span style="color:var(--accent2); font-weight:600">${fmt(c.cpl_goal)}</span>${cplNote}</div>
          ` : '<div class="cpl-target">No goal set</div>'}
        </div>
      </div>`;
  }

  div.innerHTML = head + body;
  return div;
}

// ── VIEW SWITCHING ────────────────────────────────────────────
function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (clients.length) renderCards();
}

// ── STATUS ────────────────────────────────────────────────────
function setStatus(msg, color) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.style.color = color;
}

// ── AUTO-REFRESH every 30 min ─────────────────────────────────
setInterval(() => {
  const url = document.getElementById('sheetUrl').value.trim();
  if (url && clients.length) loadFromSheet();
}, 30 * 60 * 1000);
</script>
</body>
</html>
